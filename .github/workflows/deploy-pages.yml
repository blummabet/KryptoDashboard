name: CryptoEdge Pipeline (read-only)

# Phase 1: kein Trading. Der Cron zieht die Poly-Tages-Schwellen, rechnet Fair Value (Deribit-IV),
# schreibt die Edge-Historie fort, rechnet CLV und committet die aktualisierten Daten nach docs/.
# GitHub Pages ist auf "Deploy from a branch → main → /docs" gestellt und serviert docs/ direkt —
# KEINE deploy-pages-Action (die verträgt den Cron-Andrang nicht → "Deployment failed, try again").

on:
  schedule:
    - cron: "*/30 * * * *"     # alle 30 min — Tages-Schwellen brauchen keinen Sekundentakt
  workflow_dispatch:
  # bewusst KEIN push-Trigger: der Bot-Commit unten würde sich sonst selbst neu auslösen (Loop).

permissions:
  contents: write             # data/ + docs/ zurück-committen

concurrency:
  group: cryptoedge-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pipeline — Poly + Fair Value → docs/markets.json, Snapshot → data/
        run: python build_markets.py

      - name: Auflösungen nachziehen → data/resolutions.json
        run: python resolutions.py

      - name: Konsistenz-Arb Paper-Buch → docs/arb.json
        run: python arb_engine.py

      - name: Maker-Board → docs/maker.json
        run: python maker.py

      - name: Paper-Trading (dry-run) → docs/paper.json
        run: python paper_engine.py

      - name: CLV + Kalibrierung → docs/clv.json
        run: python clv.py

      - name: Daten + Dashboard-Daten zurück-committen (Pages serviert docs/ automatisch)
        run: |
          git config user.name "cryptoedge-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/markets.json docs/clv.json docs/paper.json docs/arb.json docs/maker.json
          if git diff --cached --quiet; then
            echo "keine Änderungen"
          else
            git commit -m "chore: data + dashboard update"
            git push
          fi
