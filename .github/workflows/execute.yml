name: CryptoEdge Execute (dry-run)

# Phase 3 (DRY-RUN): führt die beabsichtigten Orders (data/intents.json) über die Gates aus und
# loggt nur, was platziert WÜRDE — kein echtes Geld, kein Wallet, kein Order-Placement.
# → läuft deshalb auf der CLOUD (ubuntu-latest); der self-hosted Mac ist hier NICHT nötig.
#
# 🔁 FÜR LIVE (später, bewusst): runs-on auf [self-hosted, macOS] umstellen (Order-Placement geht
#    NUR von der Wohn-IP — Datacenter ist bei Polymarket geoblockt), DRY_RUN auf "0", Org-Runner +
#    Org-Secrets einrichten, und zur Sicherheit :15/:45 + timeout-minutes ergänzen, damit der
#    Betting-Runner (:00/:30) nie wartet.

on:
  schedule:
    - cron: "35 * * * *"       # stündlich, versetzt zur Daten-Pipeline (:05) — weniger Deploy-Druck
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-execute
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest          # Dry-Run: Cloud reicht. Für LIVE → [self-hosted, macOS].
    timeout-minutes: 8
    env:
      DRY_RUN: "1"                   # ⛔ HART auf Dry-Run — kein echtes Geld. Für live BEWUSST auf "0".
      CRYPTO_DAILY_USDC_CAP: "12"    # ≈ €11/Tag (dein Minimum €10). Order-Größe $5 (Poly-Minimum).
      RESERVE_FLOOR_USDC: "999999"   # hoch = blockiert live, bis bewusst gesenkt
      # Wallet/API aus ORG-Secrets (im Dry-Run ungenutzt; macht das Live-Gehen zu einem Flag-Flip):
      POLY_PRIVATE_KEY:    ${{ secrets.POLY_PRIVATE_KEY }}
      POLY_API_KEY:        ${{ secrets.POLY_API_KEY }}
      POLY_API_SECRET:     ${{ secrets.POLY_API_SECRET }}
      POLY_API_PASSPHRASE: ${{ secrets.POLY_API_PASSPHRASE }}
      POLY_FUNDER_ADDRESS: ${{ secrets.POLY_FUNDER_ADDRESS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Execute — beabsichtigte Orders durch die Gates (dry-run)
        run: python execute.py
      - name: Exec-Log + Spend zurück-committen
        run: |
          git config user.name "cryptoedge-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/exec_log.jsonl data/crypto_spend.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "keine Änderung"
          else
            git commit -m "chore(exec): dry-run log [skip ci]"
            git push
          fi
