name: Tests

# Professioneller Unterbau: bei jedem Push/PR läuft die Test-Suite (Guards, Fair Value, CLV, Signale).
on:
  push:
    paths-ignore:
      - "data/**"
      - "docs/**"        # Bot-Commits (nur Daten/Dashboard) sollen die Tests nicht auslösen
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pytest installieren
        run: pip install pytest
      - name: Tests
        run: pytest -q
